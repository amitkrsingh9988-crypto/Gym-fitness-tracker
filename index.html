<body>

<h1> Gym Fitness Tracker</h1>

<div class="container">

    <div class="card">
        <h2>Fitness Calculator</h2>

        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="">
        <label>Height (cm)</label>
        <input type="number" id="height" placeholder="">

        <label>Age</label>
        <input type="number" id="age" placeholder="">

        <label>Gender</label>
        <select id="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <button onclick="calculateBMI()">Calculate</button>

        <div class="result" id="result"></div>
    </div>

    <!-- To-Do Section -->
    <div class="card">
        <h2>Today's Workout Tasks</h2>

        <div class="task-container">
            <input type="text" id="taskInput" placeholder="Enter you task...">
            <button onclick="addTask()">Add</button>
        </div>

        <p id="emptyMsg" class="empty">please add one task</p>
        <ul id="taskList"></ul>
    </div>
